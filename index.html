<!DOCTYPE html>

            min-height: 100vh;
            box-sizing: border-box;

            gap: 10px;
            margin-top: 15px;

            background: white;
            padding: 15px;
            border-radius: 12px;
            display: flex;

            cursor: pointer;
            margin-bottom: 20px;

        .btn-sm-red { background-color: var(--danger-color); color: white; padding: 6px 12px; font-size: 0.8rem; border-radius: 12px; }

                { front: "〜そのまえに / ～Noun のまえに / ～Verb dict. まえに", back: "Meaning: Indicates that an action takes place before a noun or a verb.\nParticle: の (used between Noun and まえに)\nExample: ともだちの いえに いきます。 そのまえに でんわを します。 (I am going to my friend's house. Before that, I will make a phone call.)" },

                { front: "たばこ", back: "cigarette" },
                { front: "ぼく (僕)", back: "I (used by men)" },
                { front: "のぼります (登ります)", back: "to climb" },
                { front: "すいます (吸います)", back: "to smoke" },

                deckItem.className = 'deck-item';
                deckItem.innerHTML = `
                    <div class="deck-info" onclick="openDeck('${key.replace(/'/g, "\\'")}')">
                        <div class="deck-name">${key}</div>
                        <div class="deck-count">${cardCount} cards</div>
                    </div>
                    <button class="btn-sm-red" onclick="deleteDeck(event, '${key.replace(/'/g, "\\'")}')">Delete</button>
                `;
                decksContainer.appendChild(deckItem);
            });
        }

        function createNewDeck() {
            const nameInput = document.getElementById('input-deck-name');
            const name = nameInput.value.trim();
            if (!name || decksData[name]) return alert("Invalid or duplicate deck name!");
            decksData[name] = [];
            localStorage.setItem('flashcardDecks', JSON.stringify(decksData));
            nameInput.value = '';
            renderDecks();
        }

        function deleteDeck(e, key) {
            e.stopPropagation();
            if(confirm(`Delete deck "${key}"?`)) {
                delete decksData[key];
                localStorage.setItem('flashcardDecks', JSON.stringify(decksData));
                renderDecks();
            }
        }

        function openDeck(key) {
            activeDeckKey = key; currentIndex = 0;
            currentDeckTitle.innerText = key;
            dashboardView.classList.add('hidden');
            studyView.classList.remove('hidden');
            cardElement.classList.remove('is-flipped');
            updateCard();
        }

        function showDashboard() {
            studyView.classList.add('hidden');
            dashboardView.classList.remove('hidden');
            renderDecks();
        }

        function toggleLanguageDirection() {
            isNihongoFirst = !isNihongoFirst;
            swapModeBtn.innerText = isNihongoFirst ? "🔄 Mode: Nihongo ➔ English" : "🔄 Mode: English ➔ Nihongo";
            cardElement.classList.remove('is-flipped');
            setTimeout(updateCard, 150);
        }

        function updateCard() {
            const list = decksData[activeDeckKey] || [];
            if(list.length === 0) {
                frontFace.innerText = "Empty deck. Add custom cards below!";
                backFace.innerText = "Empty";
                counterElement.innerText = "0 of 0";
                return;
            }
            
            // Format newlines with <br> for structured data representation (Grammar points)
            const formattedFront = list[currentIndex].front.replace(/\n/g, '<br>');
            const formattedBack = list[currentIndex].back.replace(/\n/g, '<br>');

            if (isNihongoFirst) {
                frontFace.innerHTML = formattedFront;
                backFace.innerHTML = formattedBack;
            } else {
                frontFace.innerHTML = formattedBack;
                backFace.innerHTML = formattedFront;
            }
            
            counterElement.innerText = `Card ${currentIndex + 1} of ${list.length}`;
        }

        function flipCard() { if((decksData[activeDeckKey]||[]).length > 0) cardElement.classList.toggle('is-flipped'); }
        function nextCard(e) { e.stopPropagation(); move(1); }
        function prevCard(e) { e.stopPropagation(); move(-1); }
        
        function move(dir) {
            const len = decksData[activeDeckKey].length;
            if (len <= 1) return;
            cardElement.classList.remove('is-flipped');
            setTimeout(() => { currentIndex = (currentIndex + dir + len) % len; updateCard(); }, 150);
        }

        function addNewCard() {
            const f = document.getElementById('input-front');
            const b = document.getElementById('input-back');
            if(!f.value.trim() || !b.value.trim()) return alert("Fill out both fields!");
            decksData[activeDeckKey].push({ front: f.value.trim(), back: b.value.trim() });
            localStorage.setItem('flashcardDecks', JSON.stringify(decksData));
            currentIndex = decksData[activeDeckKey].length - 1;
            f.value = ''; b.value = '';
            cardElement.classList.remove('is-flipped');
            setTimeout(updateCard, 150);
        }

        function editCurrentCard(e) {
            e.stopPropagation();
            const arr = decksData[activeDeckKey];
            if (!arr || arr.length === 0) return;
            
            const currentCard = arr[currentIndex];
            
            // Use prompts for terminal environment application compatibility
            const newFront = prompt("Edit Front Side (Nihongo/Hint):", currentCard.front);
            if (newFront === null) return; // User cancelled
            
            const newBack = prompt("Edit Back Side (English/Meaning):", currentCard.back);
            if (newBack === null) return; // User cancelled
            
            if (!newFront.trim() || !newBack.trim()) {
                return alert("Both sides must contain text!");
            }
            
            // Update reference, save and refresh layout
            currentCard.front = newFront.trim();
            currentCard.back = newBack.trim();
            
            localStorage.setItem('flashcardDecks', JSON.stringify(decksData));
            updateCard();
        }

        function shuffleCards(e) {
            e.stopPropagation();
            const arr = decksData[activeDeckKey];
            if(!arr || arr.length <= 1) return;
            cardElement.classList.remove('is-flipped');
            setTimeout(() => {
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                currentIndex = 0; updateCard();
            }, 150);
        }

        function deleteCurrentCard(e) {
            e.stopPropagation();
            const arr = decksData[activeDeckKey];
            if(!arr || arr.length === 0) return;
            if(confirm("Delete this card?")) {
                cardElement.classList.remove('is-flipped');
                setTimeout(() => {
                    arr.splice(currentIndex, 1);
                    localStorage.setItem('flashcardDecks', JSON.stringify(decksData));
                    if(currentIndex >= arr.length && arr.length > 0) currentIndex = arr.length - 1;
                    updateCard();
                }, 150);
            }
        }

        renderDecks();
    </script>
</body>
</html>
